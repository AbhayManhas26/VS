<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Duggi ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background-image:url("duggi.jpg"); /* MAKE SURE NAME MATCHES */
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* Dark overlay */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    z-index:0;
}

.card{
    position:relative;
    z-index:2;
    background:rgba(255,255,255,0.95);
    padding:40px;
    border-radius:25px;
    width:420px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

h2{margin-bottom:15px;}

.love-message{
    font-size:14px;
    margin:15px 0 25px 0;
    line-height:1.6;
    min-height:140px;
    white-space:pre-line;
}

.button-container{
    display:flex;
    justify-content:center;
    gap:20px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    transition:0.3s;
}

#yesBtn{
    background:#ff4b5c;
    color:white;
    font-size:20px;
}

#noBtn{
    background:#ccc;
}

#finalMessage{
    display:none;
    margin-top:20px;
    font-size:20px;
    color:#ff4b5c;
    font-weight:bold;
}

/* Hearts */
.heart{
    position:absolute;
    animation:float 6s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh);opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}
</style>
</head>

<body>

<div class="overlay"></div>

<audio id="bgMusic" loop>
    <source src="yahin.mp3" type="audio/mpeg"> <!-- MAKE SURE NAME MATCHES -->
</audio>

<div class="card">
    <h2>Duggi, will you be my Valentine? ❤️</h2>

    <div class="love-message" id="typewriter"></div>

    <div class="button-container">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>
    </div>

    <div id="finalMessage">
        Duggi 🥰 You just made me the happiest person alive ❤️🌹
    </div>
</div>

<script>

/* Play Music On First Click (Required by Browser) */
document.addEventListener("click", function () {
    document.getElementById("bgMusic").play();
}, { once: true });

/* Typewriter Message */
const messageText=`Duggi, sorry for all the mistakes I've made,
aur mujhe maalum hai main aur bhi galtiyaan karunga in future.

But I'll always love you ❤️
Mujhe lagta hai I'm addicted to you 🥺

You'll always be my kuchu, Duggi,
my rondu, my tutlu putlu — always and forever 💖🥹🌹`;

let i=0;
function typeWriter(){
    if(i<messageText.length){
        document.getElementById("typewriter").innerHTML+=messageText.charAt(i);
        i++;
        setTimeout(typeWriter,40);
    }
}
typeWriter();

/* Button Logic */
const noBtn=document.getElementById("noBtn");
const yesBtn=document.getElementById("yesBtn");
const finalMessage=document.getElementById("finalMessage");

let noScale=1,yesScale=1,noClickCount=0;

const noTexts=[
"No 😢",
"Are you sure Duggi? 🥺",
"Think again 💔",
"Don’t do this 😭",
"I’ll cry 🥲",
"Last chance 😤",
"Okay I’m tiny now 🤏"
];

noBtn.onclick=()=>{
    if(noClickCount<noTexts.length-1){
        noClickCount++;
        noBtn.innerText=noTexts[noClickCount];
        noScale-=0.12;
        noBtn.style.transform=`scale(${noScale})`;

        yesScale+=0.25;
        yesBtn.style.transform=`scale(${yesScale})`;
    }else{
        noBtn.style.display="none";
    }
};

yesBtn.onclick=()=>{
    finalMessage.style.display="block";
};

/* Floating Hearts */
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+15)+"px";
    heart.style.animationDuration=(Math.random()*3+3)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,400);

</script>

</body>
</html>
